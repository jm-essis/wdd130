<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
      content="Contact White Water Rafting Company for reservations, questions, or suggestions.">
    <meta name="author" content="Jean Marc Essis">

    <title>Contact Us - White Water Rafting</title>

    <link rel="stylesheet" href="styles/rafting1.css">
</head>

<body>

    <header>
        <img src="images/rafting.jpg" alt="Rafting Company Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <!-- COMPANY INFO -->
        <section>
            <div class="contactinfo">
                <h2>Contact Information</h2>

                <p><strong>Address:</strong> 123 River Road, Accra, Ghana</p>
                <p><strong>Phone:</strong> +233 24 123 4567</p>
                <p><strong>Email:</strong> info@whitewaterrafting.com</p>

                <!-- Google Map (no inline style) -->
                <iframe src="https://www.google.com/maps?q=Accra&output=embed" loading="lazy">
                </iframe>
            </div>
        </section>

        <!-- EMPLOYEES -->
        <section class="employees">
            <h2>Meet Our Team</h2>

            <div class="employee-profiles">
                <figure>
                    <img src="images/guide1.jpg" alt="Guide 1">
                    <figcaption>John - River Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/guide2.jpg" alt="Guide 2">
                    <figcaption>Sarah - Safety Expert</figcaption>
                </figure>

                <figure>
                    <img src="images/guide3.jpg" alt="Guide 3">
                    <figcaption>David - Trip Leader</figcaption>
                </figure>
            </div>
        </section>

        <!-- FORM -->
        <section class="contact-form">
            <h2>Send Us a Message</h2>

            <form>
                <!-- Name -->
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <!-- Email -->
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <!-- Radio buttons -->
                <p>Purpose of Message:</p>

                <label>
                    <input type="radio" name="purpose" value="general" required>
                    General Inquiry
                </label>

                <label>
                    <input type="radio" name="purpose" value="reservation">
                    Reservation Question
                </label>

                <label>
                    <input type="radio" name="purpose" value="suggestion">
                    Website Suggestion
                </label>

                <!-- Message -->
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="4"></textarea>

                <!-- Checkbox -->
                <label>
                    <input type="checkbox" name="newsletter">
                    Please subscribe me to the monthly newsletter
                </label>

                <!-- Submit -->
                <button type="submit">Send Message</button>
            </form>
        </section>

    </main>
    <footer>
        <p>&copy; 2026 White Water Rafting Company | Jean Marc Essis</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.jpg" alt="Facebook">
            </a>
            <a href="https://twitter.com">
                <img src="images/twitter.jpg" alt="Twitter">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.jpg" alt="Instagram">
            </a>
        </nav>
    </footer>

</body>

</html>
